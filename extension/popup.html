<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 380px; font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e8e8e8; padding: 20px; }
  h2 { font-size: 16px; margin-bottom: 16px; color: #fff; }
  h2 span { color: #4f8ef7; }
  .row { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; }
  label { font-size: 12px; color: #8899aa; display: block; margin-bottom: 4px; }
  select, input { background: #1a2035; border: 1px solid #2a2f45; color: #e8e8e8; padding: 8px 10px; border-radius: 8px; font-size: 13px; width: 100%; }
  select:focus, input:focus { border-color: #4f8ef7; outline: none; }
  .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }
  .btn-primary { background: #2a5ab0; color: #fff; }
  .btn-primary:hover { background: #3a6ac0; }
  .btn-primary:disabled { background: #1a2a50; color: #556; cursor: not-allowed; }
  .status { margin-top: 12px; padding: 10px; border-radius: 8px; font-size: 12px; display: none; }
  .status.show { display: block; }
  .status.ok { background: #1a3520; color: #4caf80; border: 1px solid #2a5a40; }
  .status.error { background: #3a1515; color: #ff5555; border: 1px solid #5a2525; }
  .status.loading { background: #2a2510; color: #ffa040; border: 1px solid #5a4a20; }
  .progress { margin-top: 8px; font-size: 11px; color: #667799; }
  .log { margin-top: 10px; max-height: 150px; overflow-y: auto; font-size: 11px; color: #667799; background: #0a0d14; border-radius: 6px; padding: 8px; display: none; }
  .log.show { display: block; }
  .log p { margin-bottom: 3px; }
  .log .ok { color: #4caf80; }
  .log .err { color: #ff5555; }
  .warn { font-size: 11px; color: #ffa040; margin-bottom: 12px; padding: 8px; background: #2a2510; border-radius: 6px; border: 1px solid #5a4a20; }
</style>
</head>
<body>
  <h2>Inter <span>Nation</span> Data Sync</h2>

  <div class="warn">Open <b>web-lms.inter-nation.uz</b> and login before using this extension.</div>

  <div>
    <label>Month</label>
    <select id="month">
      <option value="01">January</option><option value="02">February</option>
      <option value="03">March</option><option value="04" selected>April</option>
      <option value="05">May</option><option value="06">June</option>
      <option value="07">July</option><option value="08">August</option>
      <option value="09">September</option><option value="10">October</option>
      <option value="11">November</option><option value="12">December</option>
    </select>
  </div>

  <div class="row" style="margin-top: 12px">
    <div style="flex:1"><label>Old Year</label><input type="number" id="yearOld" value="2025"></div>
    <div style="flex:1"><label>New Year</label><input type="number" id="yearNew" value="2026"></div>
  </div>

  <div>
    <label>Region IDs (comma-separated)</label>
    <input type="text" id="regionIds" value="1,2,4132,4424" placeholder="1,2,4132,4424">
  </div>

  <button class="btn btn-primary" id="fetchBtn" onclick="startFetch()">Fetch from CRM & Save to Firebase</button>

  <div class="status" id="status"></div>
  <div class="log" id="log"></div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script src="popup.js"></script>
</body>
</html>
