<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inter Nation — Analytics Dashboard</title>
<style>
  /* v3.0 — dynamic Firebase data */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e8e8e8; min-height: 100vh; }
  .header { background: #161b27; border-bottom: 1px solid #2a2f45; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .header h1 { font-size: 20px; font-weight: 600; color: #fff; }
  .header h1 span { color: #4f8ef7; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .badge { background: #1e3a6e; color: #7eb3ff; font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid #2d5aa0; }
  .month-select { background: #1e3a6e; color: #7eb3ff; font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid #2d5aa0; cursor: pointer; outline: none; }
  .month-select option { background: #161b27; color: #e8e8e8; }
  .save-status { font-size: 11px; padding: 4px 12px; border-radius: 20px; }
  .save-status.saved { background: #1a3520; color: #4caf80; border: 1px solid #2a5a40; }
  .save-status.loading { background: #2a2510; color: #ffa040; border: 1px solid #5a4a20; }
  .tabs { display: flex; gap: 4px; padding: 16px 32px 0; background: #161b27; border-bottom: 1px solid #2a2f45; overflow-x: auto; }
  .tab { padding: 10px 20px; border-radius: 8px 8px 0 0; border: 1px solid transparent; font-size: 13px; cursor: pointer; transition: all 0.15s; color: #8899aa; white-space: nowrap; background: transparent; }
  .tab:hover { color: #c0cfe0; background: #1e2535; }
  .tab.active { color: #fff; background: #0f1117; border-color: #2a2f45; border-bottom-color: #0f1117; }
  .content { padding: 28px 32px; max-width: 1200px; margin: 0 auto; }
  .page { display: none; }
  .page.active { display: block; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { background: #1a2035; color: #8899cc; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 16px; text-align: right; border-bottom: 2px solid #2a2f45; white-space: nowrap; }
  th:first-child { text-align: left; }
  td { padding: 11px 16px; border-bottom: 1px solid #1e2535; color: #d0d8e8; vertical-align: middle; text-align: right; white-space: nowrap; }
  td:first-child { text-align: left; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #161d2f; }
  .badge-new { background: #1a3520; color: #4caf80; font-size: 11px; padding: 3px 8px; border-radius: 12px; border: 1px solid #2a5a40; font-weight: 600; }
  .badge-pos { color: #4caf80; font-weight: 600; }
  .badge-neg { background: #3a1515; color: #ff5555; font-size: 12px; padding: 3px 8px; border-radius: 5px; font-weight: 700; }
  .row-total td { background: #f0c020 !important; color: #1a1200 !important; font-weight: 700; font-size: 15px; }
  .row-tashkent td { background: #d4a800 !important; color: #1a1200 !important; font-weight: 700; }
  .row-total-green td:last-child { background: #2a6a30 !important; color: #a0ffb0 !important; }
  .row-tashkent-red td:last-child { background: #6a1515 !important; color: #ff9090 !important; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .metric { background: #161b27; border: 1px solid #2a2f45; border-radius: 10px; padding: 16px 18px; }
  .metric-label { font-size: 11px; color: #667799; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .metric-value { font-size: 26px; font-weight: 700; color: #fff; }
  .metric-value.pos { color: #4caf80; }
  .metric-value.neg { color: #ff5555; }
  .metric-sub { font-size: 12px; color: #667799; margin-top: 4px; }
  .trend-up { color: #4caf80; }
  .trend-down { color: #ff6b6b; }
  .card { background: #161b27; border: 1px solid #2a2f45; border-radius: 12px; overflow: hidden; margin-bottom: 24px; }
  .card-header { padding: 14px 18px; border-bottom: 1px solid #2a2f45; }
  .card-title { font-size: 14px; font-weight: 600; color: #ccd; }
  .card-body { overflow-x: auto; }
  .sep-row td { height: 6px; background: #0f1117 !important; padding: 0; }
  .nav-arrows { position: fixed; bottom: 30px; left: 30px; display: flex; gap: 10px; z-index: 1000; }
  .nav-btn { width: 56px; height: 56px; border-radius: 50%; border: 2px solid #2a2f45; background: #161b27; color: #7eb3ff; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
  .nav-btn:hover { background: #1e2a45; border-color: #4f8ef7; color: #fff; transform: scale(1.1); }
  .nav-btn:active { transform: scale(0.95); }
  .theme-btn { font-size: 11px; padding: 4px 12px; border-radius: 20px; background: #1e2535; color: #7eb3ff; border: 1px solid #2a2f45; cursor: pointer; transition: all 0.2s; }
  .theme-btn:hover { background: #2a3550; }
  .admin-link { font-size: 11px; padding: 4px 12px; border-radius: 20px; background: #2a1535; color: #c07bff; border: 1px solid #4a2565; cursor: pointer; text-decoration: none; }
  .admin-link:hover { background: #3a2045; }

  /* LIGHT MODE */
  body.light { background: #f0f2f5; color: #1a1a2e; }
  body.light .header { background: #1a1a1a; border-bottom-color: #333; }
  body.light .header h1 { color: #fff !important; }
  body.light .header h1 span { color: #fff !important; }
  body.light .header .save-status, body.light .header .badge, body.light .header .theme-btn { color: #fff; }
  body.light .month-select { background: #333; color: #f0c020; border-color: #555; }
  body.light .month-select option { background: #333; color: #fff; }
  body.light .badge { background: #333; color: #f0c020; border-color: #555; }
  body.light .save-status.saved { background: #2a3a20; color: #4caf80; border-color: #3a5a30; }
  body.light .save-status.loading { background: #3a3520; color: #ffa040; border-color: #5a4a20; }
  body.light .theme-btn { background: #333; color: #f0c020; border-color: #555; }
  body.light .theme-btn:hover { background: #444; }
  body.light .admin-link { background: #333; color: #f0c020; border-color: #555; }
  body.light .tabs { background: #1a1a1a; border-bottom-color: #333; }
  body.light .tab { color: #999; }
  body.light .tab:hover { color: #f0c020; background: #2a2a2a; }
  body.light .tab.active { color: #1a1a1a; background: #f0f2f5; border-color: #333; border-bottom-color: #f0f2f5; font-weight: 600; }
  body.light .card { background: #fff; border-color: #d8dce5; }
  body.light .card-header { background: #1a1a1a; border-bottom-color: #333; }
  body.light .card-title { color: #fff; }
  body.light th { background: #2a2a2a; color: #ccc; border-bottom-color: #444; }
  body.light td { color: #1a1a2e; border-bottom-color: #e8ecf2; }
  body.light tr:hover td { background: #f5f7fa; }
  body.light .badge-pos { color: #0a8a40; }
  body.light .badge-neg { background: #ffe0e0; color: #cc2222; }
  body.light .badge-new { background: #e0f5e8; color: #0a8a40; border-color: #a0d8b0; }
  body.light .row-total td { background: #f0c020 !important; color: #1a1200 !important; }
  body.light .row-tashkent td { background: #d4a800 !important; color: #1a1200 !important; }
  body.light .row-total-green td:last-child { background: #2a8a40 !important; color: #fff !important; }
  body.light .row-tashkent-red td:last-child { background: #cc2222 !important; color: #fff !important; }
  body.light .metric { background: #fff; border-color: #d8dce5; }
  body.light .metric-label { color: #6a7590; }
  body.light .metric-value { color: #1a1a2e; }
  body.light .metric-value.pos { color: #0a8a40; }
  body.light .metric-value.neg { color: #cc2222; }
  body.light .metric-sub { color: #6a7590; }
  body.light .trend-up { color: #0a8a40; }
  body.light .trend-down { color: #cc2222; }
  body.light .sep-row td { background: #f0f2f5 !important; }
  body.light .nav-btn { background: #fff; border-color: #d8dce5; color: #4f8ef7; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  body.light .nav-btn:hover { background: #e3edff; border-color: #4f8ef7; }

  @media(max-width:700px){ .content{padding:16px} .tabs{padding:12px 16px 0} .header{padding:14px 16px} .nav-arrows{bottom:16px;left:16px} .nav-btn{width:46px;height:46px;font-size:20px} }
</style>
</head>
<body>

<div class="header">
  <h1>Inter <span>Nation</span> — Analytics Dashboard</h1>
  <div class="header-right">
    <span class="save-status saved" id="status">✓ Loaded</span>
    <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()">Light Mode</button>
    <a href="admin.html" class="admin-link">Admin</a>
    <select id="month-selector" class="month-select" onchange="loadMonth(this.value)"></select>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showPage('overview',this)">Total Statistics</div>
  <div class="tab" onclick="showPage('students',this)">Students by Branches</div>
  <div class="tab" onclick="showPage('retention',this)">Lost List</div>
  <div class="tab" onclick="showPage('registered',this)">Waiting List</div>
  <div class="tab" onclick="showPage('leads',this)">Leads</div>
</div>

<div class="content" id="dashboard-content"></div>

<div class="nav-arrows">
  <button class="nav-btn" onclick="navPage(-1)" title="Назад">&#9664;</button>
  <button class="nav-btn" onclick="navPage(1)" title="Вперёд">&#9654;</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyBJ8ikYnEStYQ4c-HjtbmDVPVazLV1hgUg",
  authDomain: "inter-nation-staff-meeting.firebaseapp.com",
  databaseURL: "https://inter-nation-staff-meeting-default-rtdb.firebaseio.com",
  projectId: "inter-nation-staff-meeting",
  storageBucket: "inter-nation-staff-meeting.firebasestorage.app",
  messagingSenderId: "209791266565",
  appId: "1:209791266565:web:5f77c238ce983e1186116c"
});
const db = firebase.database();

// Theme
function toggleTheme() {
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  document.getElementById('theme-toggle').textContent = isLight ? 'Dark Mode' : 'Light Mode';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}
if (localStorage.getItem('theme') === 'light') {
  document.body.classList.add('light');
  document.addEventListener('DOMContentLoaded', () => { document.getElementById('theme-toggle').textContent = 'Dark Mode'; });
}

// Navigation
const pageIds = ['overview','students','retention','registered','leads'];
function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (el) el.classList.add('active');
  else document.querySelectorAll('.tab')[pageIds.indexOf(id)].classList.add('active');
}
function navPage(dir) {
  const cur = pageIds.findIndex(id => document.getElementById('page-' + id).classList.contains('active'));
  showPage(pageIds[(cur + dir + pageIds.length) % pageIds.length], null);
}

// Helpers
function fmt(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' '); }
function pct(a, b) { return b !== 0 ? ((a / b) * 100).toFixed(2) : '0'; }
function chgBadge(old, nw, isNew) {
  if (isNew) return `<td>${nw}</td><td><span class="badge-new">NEW</span></td>`;
  const d = nw - old, p = old > 0 ? ((d / old) * 100).toFixed(2) + '%' : '0%';
  const cls = d >= 0 ? 'badge-pos' : 'badge-neg';
  const tag = d < 0 ? `<span class="badge-neg">${p}</span>` : `<span class="badge-pos">${p}</span>`;
  return `<td>${d}</td><td>${tag}</td>`;
}
function pctCell(val, total) { return total > 0 ? ((val / total) * 100).toFixed(1) + '%' : '0%'; }

// Build dashboard from Firebase data
function buildUI(d) {
  const ms = d.monthShort || 'Mar', yo = d.yearOld || '2025', yn = d.yearNew || '2026';
  const prev = d.prevMonthLabel || 'Feb';
  const lOld = ms + ' ' + yo, lNew = ms + ' ' + yn;

  // Compute branches
  const br = Object.values(d.branches || {});
  const totalOld = br.reduce((s, b) => s + (b.old || 0), 0);
  const totalNew = br.reduce((s, b) => s + (b.new || 0), 0);
  const tashOld = br.filter(b => b.region === 'tashkent').reduce((s, b) => s + (b.old || 0), 0);
  const tashNew = br.filter(b => b.region === 'tashkent').reduce((s, b) => s + (b.new || 0), 0);
  const newBranches = br.filter(b => b.isNew).map(b => b.name).join(', ');
  const growthAbs = totalNew - totalOld;
  const growthPct = totalOld > 0 ? ((growthAbs / totalOld) * 100).toFixed(2) : '0';
  const tashChg = tashNew - tashOld;
  const tashPct = tashOld > 0 ? ((tashChg / tashOld) * 100).toFixed(2) : '0';

  // Regions
  const regions = {};
  br.forEach(b => {
    const r = b.region || 'tashkent';
    if (!regions[r]) regions[r] = { name: r === 'tashkent' ? 'Ташкент' : r === 'samarkand' ? 'Самарканд' : r === 'andijan' ? 'Андижан' : r === 'online' ? 'Онлайн' : r, old: 0, new: 0, isNew: false };
    regions[r].old += b.old || 0;
    regions[r].new += b.new || 0;
    if (b.isNew && regions[r].old === 0) regions[r].isNew = true;
  });

  // Top growth/decline
  const sorted = br.filter(b => !b.isNew).map(b => ({ ...b, chg: (b.new || 0) - (b.old || 0) })).sort((a, b) => b.chg - a.chg);
  const topGrowth = sorted.filter(b => b.chg > 0).slice(0, 3);
  const topDecline = sorted.filter(b => b.chg < 0).slice(0, 3);

  // Levels & Age totals
  const lv = Object.values(d.levels || {});
  const lvTotalOld = lv.reduce((s, l) => s + (l.old || 0), 0);
  const lvTotalNew = lv.reduce((s, l) => s + (l.new || 0), 0);
  const ag = Object.values(d.ageGroups || {});
  const agTotalOld = ag.reduce((s, a) => s + (a.old || 0), 0);
  const agTotalNew = ag.reduce((s, a) => s + (a.new || 0), 0);

  // New students
  const ns = Object.values(d.newStudents || {});
  const nsTotalOld = ns.reduce((s, n) => s + (n.old || 0), 0);
  const nsTotalNew = ns.reduce((s, n) => s + (n.new || 0), 0);
  const nsTashOld = ns.filter(n => !n.isNew && !['Samarkand','Andijan','Online'].includes(n.name)).reduce((s, n) => s + (n.old || 0), 0);
  const nsTashNew = ns.filter(n => !['Samarkand','Andijan','Online'].includes(n.name) && !n.isNew).reduce((s, n) => s + (n.new || 0), 0);

  // Leads
  const ld = Object.values(d.leads || {});
  const ldTotalOld = ld.reduce((s, l) => s + (l.old || 0), 0);
  const ldTotalNew = ld.reduce((s, l) => s + (l.new || 0), 0);
  const lb = Object.values(d.leadsBranch || {});
  const lbTotalOld = lb.reduce((s, l) => s + (l.old || 0), 0);
  const lbTotalNew = lb.reduce((s, l) => s + (l.new || 0), 0);

  // Retention
  const rt = Object.values(d.retention || {});

  let h = '';

  // === PAGE: OVERVIEW ===
  h += `<div class="page active" id="page-overview">
  <div class="metrics">
    <div class="metric"><div class="metric-label">Total ${lOld}</div><div class="metric-value">${fmt(totalOld)}</div><div class="metric-sub">студентов</div></div>
    <div class="metric"><div class="metric-label">Total ${lNew}</div><div class="metric-value">${fmt(totalNew)}</div><div class="metric-sub">студентов</div></div>
    <div class="metric"><div class="metric-label">Рост (рел.)</div><div class="metric-value pos">+${fmt(growthAbs)}</div><div class="metric-sub">человек</div></div>
    <div class="metric"><div class="metric-label">Рост %</div><div class="metric-value pos">+${growthPct}%</div><div class="metric-sub">год к году</div></div>
    <div class="metric"><div class="metric-label">Ташкент ${yn}</div><div class="metric-value neg">${tashPct}%</div><div class="metric-sub">${tashChg >= 0 ? 'рост' : 'снижение'}</div></div>
    <div class="metric"><div class="metric-label">Новых филиалов</div><div class="metric-value pos">${br.filter(b=>b.isNew).length}</div><div class="metric-sub">${newBranches}</div></div>
  </div>
  <div class="card"><div class="card-header"><span class="card-title">Итого по регионам</span></div><div class="card-body"><table><thead><tr><th>Регион</th><th>${lOld}</th><th>${lNew}</th><th>Изм. (рел.)</th><th>Изм. (%)</th></tr></thead><tbody>`;
  Object.values(regions).forEach(r => { h += `<tr><td>${r.name}</td><td>${fmt(r.old)}</td><td>${fmt(r.new)}</td>${chgBadge(r.old, r.new, r.isNew)}</tr>`; });
  h += `<tr class="row-total row-total-green"><td>TOTAL</td><td>${fmt(totalOld)}</td><td>${fmt(totalNew)}</td><td>${growthAbs}</td><td>${growthPct}%</td></tr></tbody></table></div></div>`;

  h += `<div class="card"><div class="card-header"><span class="card-title">Топ роста / падения по филиалам</span></div><div class="card-body"><table><thead><tr><th>Филиал</th><th>Изменение</th><th>%</th><th>Статус</th></tr></thead><tbody>`;
  topGrowth.forEach(b => { const p = pct(b.chg, b.old); h += `<tr><td>${b.name}</td><td>+${b.chg}</td><td><span class="badge-pos">+${p}%</span></td><td>${b.chg === Math.max(...topGrowth.map(x=>x.chg)) ? 'Лидер' : 'Хорошо'}</td></tr>`; });
  h += `<tr class="sep-row"><td colspan="4"></td></tr>`;
  topDecline.forEach(b => { const p = pct(b.chg, b.old); h += `<tr><td>${b.name}</td><td>${b.chg}</td><td><span class="badge-neg">${p}%</span></td><td>Проблема</td></tr>`; });
  h += `</tbody></table></div></div></div>`;

  // === PAGE: STUDENTS ===
  h += `<div class="page" id="page-students"><div class="card"><div class="card-header"><span class="card-title">Студенты по филиалам — ${lOld} vs ${lNew}</span></div><div class="card-body"><table><thead><tr><th>Филиал</th><th>${lOld}</th><th>${lNew}</th><th>Изм. (рел.)</th><th>Изм. (%)</th></tr></thead><tbody>`;
  br.forEach(b => { h += `<tr><td>${b.name}</td><td>${fmt(b.old)}</td><td>${fmt(b.new)}</td>${chgBadge(b.old, b.new, b.isNew)}</tr>`; });
  h += `<tr class="row-tashkent row-tashkent-red"><td>TASHKENT</td><td>${fmt(tashOld)}</td><td>${fmt(tashNew)}</td><td>${tashChg}</td><td>${tashPct}%</td></tr>`;
  h += `<tr class="row-total row-total-green"><td>TOTAL</td><td>${fmt(totalOld)}</td><td>${fmt(totalNew)}</td><td>${growthAbs}</td><td>${growthPct}%</td></tr>`;
  h += `</tbody></table></div></div></div>`;

  // === PAGE: RETENTION ===
  h += `<div class="page" id="page-retention"><div class="card"><div class="card-header"><span class="card-title">Удержание: ${prev} → ${ms} (по уровням)</span></div><div class="card-body"><table><thead><tr><th>Уровень</th><th>${yo} ${prev}</th><th>Ушли ${lOld}</th><th>Loss % ${yo}</th><th>${yn} ${prev}</th><th>Ушли ${lNew}</th><th>Loss % ${yn}</th><th>Тренд</th></tr></thead><tbody>`;
  rt.forEach(r => {
    const lp25 = r.prevOld > 0 ? ((r.lostOld / r.prevOld) * 100).toFixed(1) : '0';
    const lp26 = r.prevNew > 0 ? ((r.lostNew / r.prevNew) * 100).toFixed(1) : '0';
    const trend = parseFloat(lp26) < parseFloat(lp25) ? 'Улучшение' : (parseFloat(lp26) > parseFloat(lp25) ? 'Хуже' : 'Без изменений');
    const cls = trend === 'Улучшение' ? 'trend-up' : 'trend-down';
    h += `<tr><td>${r.name}</td><td>${fmt(r.prevOld)}</td><td>${r.lostOld}</td><td>${lp25}%</td><td>${fmt(r.prevNew)}</td><td>${r.lostNew}</td><td>${lp26}%</td><td class="${cls}" style="font-weight:600">${trend}</td></tr>`;
  });
  h += `</tbody></table></div></div></div>`;

  // === PAGE: REGISTERED (Waiting List) ===
  h += `<div class="page" id="page-registered">`;
  // Levels
  h += `<div class="card"><div class="card-header"><span class="card-title">Распределение по уровням — ${lOld} vs ${lNew}</span></div><div class="card-body"><table><thead><tr><th>Уровень</th><th>${lOld}</th><th>${lOld} %</th><th>${lNew} %</th><th>${lNew}</th></tr></thead><tbody>`;
  lv.forEach(l => { h += `<tr><td>${l.name}</td><td>${l.old}</td><td>${pctCell(l.old, lvTotalOld)}</td><td>${pctCell(l.new, lvTotalNew)}</td><td>${l.new}</td></tr>`; });
  h += `<tr class="row-total"><td>TOTAL</td><td>${fmt(lvTotalOld)}</td><td></td><td></td><td>${fmt(lvTotalNew)}</td></tr></tbody></table></div></div>`;
  // Age
  h += `<div class="card"><div class="card-header"><span class="card-title">Распределение по возрасту — ${lOld} vs ${lNew}</span></div><div class="card-body"><table><thead><tr><th>Возраст</th><th>${lOld}</th><th>${lOld} %</th><th>${lNew} %</th><th>${lNew}</th></tr></thead><tbody>`;
  ag.forEach(a => { h += `<tr><td>${a.name}</td><td>${a.old}</td><td>${pctCell(a.old, agTotalOld)}</td><td>${pctCell(a.new, agTotalNew)}</td><td>${a.new}</td></tr>`; });
  h += `<tr class="row-total"><td>TOTAL</td><td>${fmt(agTotalOld)}</td><td></td><td></td><td>${fmt(agTotalNew)}</td></tr></tbody></table></div></div>`;
  // New Students
  h += `<div class="card"><div class="card-header"><span class="card-title">Новые студенты по филиалам — ${lNew} vs ${lOld}</span></div><div class="card-body"><table><thead><tr><th>Филиал</th><th>${lOld}</th><th>${lNew}</th><th>Изм. (рел.)</th><th>Изм. (%)</th></tr></thead><tbody>`;
  ns.forEach(n => { h += `<tr><td>${n.name}</td><td>${n.old}</td><td>${n.new}</td>${chgBadge(n.old, n.new, n.isNew)}</tr>`; });
  const nsTashChg = nsTashNew - nsTashOld, nsTashPct = nsTashOld > 0 ? ((nsTashChg / nsTashOld) * 100).toFixed(2) : '0';
  const nsChg = nsTotalNew - nsTotalOld, nsPct = nsTotalOld > 0 ? ((nsChg / nsTotalOld) * 100).toFixed(2) : '0';
  h += `<tr class="row-tashkent row-tashkent-red"><td>TASHKENT</td><td>${fmt(nsTashOld)}</td><td>${fmt(nsTashNew)}</td><td>${nsTashChg}</td><td>${nsTashPct}%</td></tr>`;
  h += `<tr class="row-total row-total-green"><td>TOTAL</td><td>${fmt(nsTotalOld)}</td><td>${fmt(nsTotalNew)}</td><td>${nsChg}</td><td>${nsPct}%</td></tr>`;
  h += `</tbody></table></div></div></div>`;

  // === PAGE: LEADS ===
  h += `<div class="page" id="page-leads">`;
  // By Level
  h += `<div class="card"><div class="card-header"><span class="card-title">Registered Leads by Level — ${lOld} vs ${lNew}</span></div><div class="card-body"><table><thead><tr><th>Уровень</th><th>${lOld}</th><th>${lOld} %</th><th>${lNew}</th><th>${lNew} %</th><th>Изм. (рел.)</th><th>Изм. (%)</th></tr></thead><tbody>`;
  ld.forEach(l => {
    const chg = (l.new || 0) - (l.old || 0), p = l.old > 0 ? ((chg / l.old) * 100).toFixed(1) + '%' : (l.new > 0 ? 'NEW' : '0%');
    const tag = chg < 0 ? `<span class="badge-neg">${p}</span>` : `<span class="badge-pos">${p}</span>`;
    h += `<tr><td>${l.name}</td><td>${l.old}</td><td>${pctCell(l.old, ldTotalOld)}</td><td>${l.new}</td><td>${pctCell(l.new, ldTotalNew)}</td><td>${chg}</td><td>${tag}</td></tr>`;
  });
  const ldChg = ldTotalNew - ldTotalOld, ldPctV = ldTotalOld > 0 ? ((ldChg / ldTotalOld) * 100).toFixed(2) : '0';
  h += `<tr class="row-total row-total-green"><td>TOTAL</td><td>${fmt(ldTotalOld)}</td><td></td><td>${fmt(ldTotalNew)}</td><td></td><td>${ldChg}</td><td>${ldPctV}%</td></tr></tbody></table></div></div>`;
  // By Branch
  h += `<div class="card"><div class="card-header"><span class="card-title">Registered Leads by Branch — ${lOld} vs ${lNew}</span></div><div class="card-body"><table><thead><tr><th>Филиал</th><th>${lOld}</th><th>${lNew}</th><th>Изм. (рел.)</th><th>Изм. (%)</th></tr></thead><tbody>`;
  lb.forEach(l => { h += `<tr><td>${l.name}</td><td>${l.old}</td><td>${l.new}</td>${chgBadge(l.old, l.new, l.isNew)}</tr>`; });
  const lbChg = lbTotalNew - lbTotalOld, lbPctV = lbTotalOld > 0 ? ((lbChg / lbTotalOld) * 100).toFixed(2) : '0';
  h += `<tr class="row-total row-total-green"><td>TOTAL</td><td>${fmt(lbTotalOld)}</td><td>${fmt(lbTotalNew)}</td><td>${lbChg}</td><td>${lbPctV}%</td></tr>`;
  h += `</tbody></table></div></div></div>`;

  document.getElementById('dashboard-content').innerHTML = h;
}

// Load month from Firebase
function loadMonth(key) {
  const st = document.getElementById('status');
  st.textContent = '⏳ Loading...'; st.className = 'save-status loading';
  db.ref('months/' + key).once('value').then(snap => {
    const data = snap.val();
    if (data) {
      buildUI(data);
      st.textContent = '✓ Loaded'; st.className = 'save-status saved';
    } else {
      st.textContent = '✗ No data'; st.className = 'save-status loading';
    }
  }).catch(() => {
    st.textContent = '✗ Error'; st.className = 'save-status loading';
  });
}

// Init: load config, populate month selector, load current month
db.ref('config').once('value').then(snap => {
  const cfg = snap.val();
  if (!cfg) return;
  const sel = document.getElementById('month-selector');
  const months = cfg.availableMonths || {};
  const sorted = Object.entries(months).sort((a, b) => (b[1].order || 0) - (a[1].order || 0));
  sorted.forEach(([key, m]) => {
    const opt = document.createElement('option');
    opt.value = key; opt.textContent = m.label;
    if (key === cfg.currentMonth) opt.selected = true;
    sel.appendChild(opt);
  });
  loadMonth(cfg.currentMonth || sorted[0]?.[0]);
});
</script>
